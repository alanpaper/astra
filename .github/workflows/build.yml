name: Production Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ==================== 构建阶段（矩阵并行） ====================
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows

    runs-on: ${{ matrix.os }}
    timeout-minutes: 120

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ================= 从 git tag 提取版本 =================
      - name: Extract version from tag
        id: version
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
        shell: bash

      # ================= 更新 tauri.conf.json =================
      - name: Update tauri.conf.json version
        run: |
          python3 << 'EOF'
          import json
          version = "${{ steps.version.outputs.version }}"
          with open('src-tauri/tauri.conf.json', 'r', encoding='utf-8') as f:
              config = json.load(f)
          config['version'] = version
          with open('src-tauri/tauri.conf.json', 'w', encoding='utf-8') as f:
              json.dump(config, f, ensure_ascii=False, indent=2)
          print(f"Updated tauri.conf.json to version {version}")
          EOF
        shell: bash

      # ================= 更新 Cargo.toml =================
      - name: Update Cargo.toml version
        run: |
          python3 << 'EOF'
          import re
          version = "${{ steps.version.outputs.version }}"
          with open('src-tauri/Cargo.toml', 'r', encoding='utf-8') as f:
              content = f.read()
          content = re.sub(r'version\s*=\s*"[^"]*"', f'version = "{version}"', content, count=1)
          with open('src-tauri/Cargo.toml', 'w', encoding='utf-8') as f:
              f.write(content)
          print(f"Updated Cargo.toml to version {version}")
          EOF
        shell: bash

      # ================= NODE =================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ================= PNPM =================
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      # ================= RUST =================
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          cache-all-crates: true
          save-if: ${{ github.event_name == 'push' }}

      # ================= WINDOWS DEPENDENCIES =================
      - name: Install Windows build dependencies
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          refreshenv
          $WixPath = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (Test-Path $WixPath) {
            [Environment]::SetEnvironmentVariable("Path", $env:Path + ";$WixPath", "User")
            $env:Path += ";$WixPath"
          }

      # ================= INSTALL DEPENDENCIES =================
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ================= BUILD =================
      - name: Build Tauri App
        run: pnpm tauri build
        env:
          TAURI_SKIP_VALIDATION: true

      # ================= 上传构建产物（供 release job 使用） =================
      - name: Upload macOS artifacts
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.tar.gz
          retention-days: 7

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7

  # ==================== 发布阶段（独立 job，顺序执行） ====================
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ================= 获取版本号 =================
      - name: Get version
        id: version
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
        shell: bash

      # ================= 下载所有构建产物 =================
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: ./release-assets/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: ./release-assets/windows

      # ================= 列出下载的文件（调试用） =================
      - name: List downloaded files
        run: |
          echo "=== macOS files ==="
          ls -la ./release-assets/macos || echo "No macOS files"
          echo "=== Windows files ==="
          ls -la ./release-assets/windows || echo "No Windows files"
        shell: bash

      # ================= 创建 Release =================
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: "星野 ${{ steps.version.outputs.version }}"
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ================= 上传 macOS 产物 =================
      - name: Upload macOS DMG
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release-assets/macos/*.dmg
          asset_name: 星野-${{ steps.version.outputs.version }}.dmg
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows NSIS
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release-assets/windows/*.exe
          asset_name: 星野-${{ steps.version.outputs.version }}-setup.exe
          asset_content_type: application/vnd.microsoft.portable-executable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
