name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ================= FIX 1: LOCK PNPM VERSION =================
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0 # ✅ 固定版本（关键修复）

      # ================= NODE =================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # ================= FIX 2: DISABLE STRICT POLICY =================
      - name: Disable pnpm build security policy
        run: pnpm config set enable-pre-post-scripts true

      # ================= INSTALL =================
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --unsafe-perm

      # ================= RUST =================
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      # ================= BUILD =================
      - name: Build Tauri App
        run: pnpm tauri build --target ${{ matrix.target }}

      # ================= RELEASE =================
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "星野 ${{ github.ref_name }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ================= MAC =================
      - name: Upload DMG
        if: matrix.platform == 'macos'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ================= WINDOWS =================
      - name: Upload EXE
        if: matrix.platform == 'windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
